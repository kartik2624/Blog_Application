<!DOCTYPE html>
<html>
<head>
    <title>Delete Comment</title>
</head>
<body>

<h2>Delete Comment</h2>

<p>
    Are you sure you want to delete this comment?
</p>

<p>
    "{{ comment.content }}"
</p>

<form method="POST">
    {% csrf_token %}

    <button type="submit">
        Yes, Delete
    </button>
</form>

<a href="{% url 'article_detail' comment.article.id %}">
    Cancel
</a>

</body>
</html>
