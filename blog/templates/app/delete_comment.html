{% extends 'base.html' %}
{% block title %}Delete Comment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4 text-center">
                <h3 class="mb-3">🗑️ Delete Comment</h3>
                <p class="text-muted">Are you sure you want to delete this comment?</p>
                <blockquote class="blockquote mb-4">
                    <p class="mb-0 text-muted fst-italic">"{{ comment.content }}"</p>
                </blockquote>

                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
