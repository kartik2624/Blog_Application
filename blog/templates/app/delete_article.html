{% extends 'base.html' %}
{% block title %}Delete Article{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4 text-center">
                <h3 class="mb-3">🗑️ Delete Article</h3>
                <p class="text-muted">Are you sure you want to delete:</p>
                <h5 class="mb-4">"{{ article.title }}"</h5>

                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
                    <a href="{% url 'article_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
