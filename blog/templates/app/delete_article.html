<!DOCTYPE html>
<html>
<head>
    <title>Delete Article</title>
</head>
<body>

<h2>Delete Article</h2>

<p>
    Are you sure you want to delete:
</p>

<h3>{{ article.title }}</h3>

<form method="POST">
    {% csrf_token %}

    <button type="submit">
        Yes, Delete
    </button>
</form>

<br>

<a href="{% url 'article_detail' article.id %}">
    Cancel
</a>

</body>
</html>
